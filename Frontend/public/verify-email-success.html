<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xác nhận email thành công</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #0b1220;
        --card: rgba(255, 255, 255, 0.08);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rggba(255, 255, 255, 0.72);
        --border: rgba(255, 255, 255, 0.14);
        --accent: #7c3aed;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background: radial-gradient(1200px 800px at 20% 10%, #2b1b63, transparent),
          radial-gradient(900px 600px at 90% 30%, #123a7a, transparent),
          var(--bg);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 560px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 28px 24px;
        backdrop-filter: blur(10px);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45);
      }
      h1 {
        margin: 0 0 8px 0;
        font-size: 24px;
        line-height: 1.25;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }
      a {
        display: inline-block;
        margin-top: 16px;
        text-decoration: none;
        color: white;
        background: var(--accent);
        padding: 10px 14px;
        border-radius: 10px;
        font-weight: 600;
      }
      a:focus-visible {
        outline: 3px solid rgba(124, 58, 237, 0.55);
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main class="card" role="main">
      <h1>Xác nhận email thành công</h1>
      <p>Bạn có thể quay lại ứng dụng và đăng nhập bình thường.</p>
      <a href="/">Về trang chủ</a>
    </main>
  </body>
</html>
